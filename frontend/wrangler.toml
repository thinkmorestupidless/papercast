name = "papercast"
pages_build_output_dir = "dist"

# Runtime variable for the Pages Function proxy.
# The Akka service URL is not sensitive — it's a public hostname.
[vars]
AKKA_SERVICE_URL = "https://rough-wood-1748.europe-west1.akka.services"

# VITE_* variables are build-time: Cloudflare bakes them into the JS bundle
# at build time. They are committed in frontend/.env.production.
